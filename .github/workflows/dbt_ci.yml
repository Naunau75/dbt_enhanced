name: dbt CI/CD

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: dbt_enhanced
        run: uv sync

      - name: Run dbt build
        working-directory: dbt_enhanced/dbt_ecommerce
        run: uv run dbt build
        env:
          DBT_PROFILES_DIR: .
